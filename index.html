<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ВРУМ ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--border:#2a2a2a;
  --accent:#FFD600;--green:#00E676;--red:#FF1744;--blue:#2979FF;
  --orange:#FF6D00;--purple:#D500F9;--text:#F0F0F0;--muted:#555;
  --ff:'Bebas Neue',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Manrope',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);display:flex;flex-direction:column}

.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:var(--ff);font-size:26px;letter-spacing:3px;color:var(--accent)}
.clock{font-family:var(--fm);font-size:11px;color:var(--muted);text-align:right}
.clock b{display:block;color:var(--text);font-size:13px;letter-spacing:1px}

.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:11px 4px;font-family:var(--ff);font-size:14px;letter-spacing:1px;text-align:center;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.on{color:var(--accent);border-color:var(--accent)}

.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 90px}
.page.on{display:block}

.shift{display:flex;gap:8px;margin-bottom:8px;margin-top:8px}
.shift select{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-family:var(--fm);font-size:13px;outline:none}
.shift select:focus{border-color:var(--accent)}

.syncbar{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sinfo{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:11px;color:var(--muted)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.ok{background:var(--green)}.sdot.err{background:var(--red)}.sdot.spin{background:var(--accent);animation:blink .5s infinite}
